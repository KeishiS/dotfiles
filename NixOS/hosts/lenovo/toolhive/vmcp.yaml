name: agent-services
groupRef: agent-services

incomingAuth:
  type: oidc
  oidc:
    issuer: https://id.sandi05.com/oauth2/openid/toolhive-mcp
    clientId: toolhive-mcp
    audience: toolhive-mcp
    resource: https://mcp.sandi05.com/mcp
    # Split DNS resolves this pinned, trusted issuer to 192.168.100.20.
    # ToolHive applies this exception to its OIDC validator HTTP requests.
    jwksAllowPrivateIp: true
    scopes:
      - openid
  authz:
    type: cedar
    policies:
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_list_children_notes"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_search_notes"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_get_note"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_resolve_note_id"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_read_attributes"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_create_note"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_update_note"
        );
      - |
        permit(
          principal,
          action == Action::"call_tool",
          resource == Tool::"triliumnext_manage_attributes"
        );

outgoingAuth:
  source: inline
  default:
    type: unauthenticated

aggregation:
  conflictResolution: prefix
  conflictResolutionConfig:
    prefixFormat: "{workload}_"

operational:
  timeouts:
    default: 30s
    perWorkload:
      triliumnext: 30s
      leantime: 30s
  failureHandling:
    healthCheckInterval: 30s
    unhealthyThreshold: 3
    partialFailureMode: fail
    circuitBreaker:
      enabled: true
      failureThreshold: 5
      timeout: 60s

audit:
  component: agent-services-vmcp
  eventTypes:
    - mcp_initialize
    - mcp_tool_call
  includeRequestData: false
  includeResponseData: false
  maxDataSize: 0
